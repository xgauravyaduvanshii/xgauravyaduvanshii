<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0F2027" />
            <stop offset="50%" stop-color="#203A43" />
            <stop offset="100%" stop-color="#2C5364" />
        </linearGradient>

        <!-- Animated Text Gradient -->
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="200%" y2="0%">
            <stop offset="0%" stop-color="#00f2fe" />
            <stop offset="25%" stop-color="#4facfe" />
            <stop offset="50%" stop-color="#00f2fe" />
            <stop offset="75%" stop-color="#4facfe" />
            <stop offset="100%" stop-color="#00f2fe" />
        </linearGradient>

        <!-- Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Animations -->
        <style>
            .title {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 800;
                font-size: 38px;
                fill: url(#text-grad);
                animation: gradient-shift 5s linear infinite;
            }
            .subtitle {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 500;
                font-size: 22px;
                fill: #ffffff;
                opacity: 0.9;
                letter-spacing: 2px;
            }
            .ceo {
                font-family: 'Courier New', Courier, monospace;
                font-weight: bold;
                font-size: 20px;
                fill: #FFD700; /* Gold */
                filter: url(#glow);
                animation: pulse 2s infinite alternate;
            }
            .stars {
                animation: twinkle 4s infinite alternate;
            }

            @keyframes gradient-shift {
                0% { background-position: 0% 50%; }
                100% { background-position: 100% 50%; }
            }

            @keyframes pulse {
                0% { transform: scale(1); opacity: 0.8; }
                100% { transform: scale(1.02); opacity: 1; }
            }
            
            @keyframes twinkle {
                0% { opacity: 0.3; }
                50% { opacity: 1; }
                100% { opacity: 0.3; }
            }
            
            /* Floating blocks */
            .float1 { animation: float 6s ease-in-out infinite; }
            .float2 { animation: float 8s ease-in-out infinite reverse; }
            
            @keyframes float {
                0% { transform: translateY(0px) rotate(0deg); }
                50% { transform: translateY(-15px) rotate(5deg); }
                100% { transform: translateY(0px) rotate(0deg); }
            }
        </style>
    </defs>

    <!-- Background -->
    <rect width="800" height="250" rx="15" fill="url(#bg-grad)" />

    <!-- Decorative Elements (Abstract floating shapes) -->
    <g class="float1" opacity="0.4">
        <circle cx="100" cy="50" r="40" fill="#4facfe" filter="url(#glow)" />
        <path d="M 700 200 Q 750 150 800 250" stroke="#00f2fe" stroke-width="3" fill="none" opacity="0.6"/>
    </g>
    <g class="float2" opacity="0.3">
        <rect x="650" y="30" width="60" height="60" rx="10" fill="#8E2DE2" transform="rotate(25 680 60)" filter="url(#glow)"/>
        <circle cx="150" cy="200" r="20" fill="#4A00E0" />
    </g>
    
    <!-- Stars -->
    <g class="stars" fill="#ffffff" opacity="0.8">
        <circle cx="50" cy="150" r="1.5" />
        <circle cx="200" cy="80" r="2" />
        <circle cx="400" cy="40" r="1" />
        <circle cx="600" cy="120" r="2.5" />
        <circle cx="750" cy="70" r="1.5" />
        <circle cx="350" cy="220" r="2" />
        <circle cx="550" cy="190" r="1" />
    </g>

    <!-- Main Content -->
    <text x="50%" y="100" text-anchor="middle" class="title">Hi there, I'm Gaurav Yaduvanshii 👋</text>
    <text x="50%" y="145" text-anchor="middle" class="subtitle">Full Stack Developer &amp; Open Source Enthusiast</text>
    
    <!-- CEO Title with Glow and Box -->
    <g transform="translate(400, 195)" class="ceo">
        <rect x="-135" y="-22" width="270" height="32" rx="6" fill="#121212" stroke="#FFD700" stroke-width="1.5" opacity="0.8"/>
        <text x="0" y="0" text-anchor="middle" fill="#FFD700">👑 CEO of FlyingDarkDev</text>
    </g>
</svg>
