<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="150">
    <defs>
        <!-- Background -->
        <linearGradient id="mp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#141E30" />
            <stop offset="100%" stop-color="#243B55" />
        </linearGradient>

        <!-- Disc Gradient -->
        <radialGradient id="disc" cx="50%" cy="50%" r="50%">
            <stop offset="80%" stop-color="#111" />
            <stop offset="90%" stop-color="#333" />
            <stop offset="100%" stop-color="#111" />
        </radialGradient>
        
        <!-- Vinyl Grooves -->
        <radialGradient id="groove" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="transparent" />
            <stop offset="20%" stop-color="#222" />
            <stop offset="21%" stop-color="transparent" />
            <stop offset="40%" stop-color="#222" />
            <stop offset="41%" stop-color="transparent" />
            <stop offset="60%" stop-color="#222" />
            <stop offset="61%" stop-color="transparent" />
            <stop offset="80%" stop-color="#222" />
            <stop offset="81%" stop-color="transparent" />
        </radialGradient>

        <style>
            .player-text {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                fill: #ffffff;
            }
            .track-title {
                font-size: 18px;
                font-weight: bold;
            }
            .artist {
                font-size: 14px;
                fill: #a0aab5;
            }
            .time {
                font-size: 12px;
                fill: #a0aab5;
                font-family: monospace;
            }
            
            /* Animations */
            .spin {
                animation: spin 4s linear infinite;
                transform-origin: 85px 75px;
            }

            @keyframes spin {
                100% { transform: rotate(360deg); }
            }

            .bar {
                fill: #00f2fe;
                animation: bounce 1s ease-in-out infinite alternate;
                transform-origin: bottom;
            }

            .b1 { animation-delay: 0.1s; }
            .b2 { animation-delay: 0.5s; fill: #4facfe; }
            .b3 { animation-delay: 0.2s; }
            .b4 { animation-delay: 0.8s; fill: #4facfe; }
            .b5 { animation-delay: 0.4s; }
            .b6 { animation-delay: 0.9s; fill: #4facfe; }
            .b7 { animation-delay: 0.3s; }
            .b8 { animation-delay: 0.7s; fill: #4facfe; }
            .b9 { animation-delay: 0.6s; }
            .b10 { animation-delay: 0.2s; fill: #4facfe; }

            @keyframes bounce {
                0% { transform: scaleY(0.2); }
                100% { transform: scaleY(1); }
            }
            
            .progress-bar-fill {
                animation: progress 60s linear infinite;
            }
            
            @keyframes progress {
                0% { width: 0%; }
                100% { width: 100%; }
            }
        </style>
    </defs>

    <!-- Main Container -->
    <rect width="600" height="150" rx="15" fill="url(#mp-bg)" />

    <!-- Spinning Vinyl Record -->
    <g class="spin">
        <circle cx="85" cy="75" r="55" fill="url(#disc)" />
        <circle cx="85" cy="75" r="55" fill="url(#groove)" opacity="0.5" />
        <!-- Record Label -->
        <circle cx="85" cy="75" r="20" fill="#ff4b2b" />
        <circle cx="85" cy="75" r="5" fill="#141E30" />
        <!-- Reflection -->
        <path d="M 85 20 A 55 55 0 0 1 140 75 L 85 75 Z" fill="#ffffff" opacity="0.05" />
    </g>

    <!-- Music Info Text -->
    <text x="170" y="55" class="player-text track-title">Currently Vibing 🎧</text>
    <text x="170" y="80" class="player-text artist">Lofi Coding Beats • Chillwave</text>

    <!-- Progress Bar -->
    <rect x="170" y="110" width="300" height="4" rx="2" fill="#33475b" />
    <rect x="170" y="110" width="120" height="4" rx="2" fill="#00f2fe" class="progress-bar-fill"/>
    <circle cx="290" cy="112" r="6" fill="#ffffff" /> <!-- playhead indicator -->

    <text x="480" y="115" class="time">2:45 / 4:20</text>

    <!-- Audio Visualizer (Bars) -->
    <g transform="translate(420, 85) rotate(180)">
        <rect x="-10" y="0" width="4" height="30" rx="1" class="bar b1" />
        <rect x="-18" y="0" width="4" height="30" rx="1" class="bar b2" />
        <rect x="-26" y="0" width="4" height="30" rx="1" class="bar b3" />
        <rect x="-34" y="0" width="4" height="30" rx="1" class="bar b4" />
        <rect x="-42" y="0" width="4" height="30" rx="1" class="bar b5" />
        <rect x="-50" y="0" width="4" height="30" rx="1" class="bar b6" />
        <rect x="-58" y="0" width="4" height="30" rx="1" class="bar b7" />
        <rect x="-66" y="0" width="4" height="30" rx="1" class="bar b8" />
        <rect x="-74" y="0" width="4" height="30" rx="1" class="bar b9" />
        <rect x="-82" y="0" width="4" height="30" rx="1" class="bar b10" />
    </g>
    
    <!-- Controls Icons (Play, Prev, Next) -->
    <g fill="#ffffff" opacity="0.8" transform="translate(380, 52) scale(0.6)">
        <!-- Prev -->
        <path d="M 0 10 L 15 0 L 15 20 Z" />
        <rect x="-3" y="0" width="3" height="20" />
        <!-- Play / Pause -->
        <rect x="25" y="0" width="6" height="20" />
        <rect x="35" y="0" width="6" height="20" />
        <!-- Next -->
        <path d="M 65 10 L 50 0 L 50 20 Z" />
        <rect x="66" y="0" width="3" height="20" />
    </g>

</svg>
