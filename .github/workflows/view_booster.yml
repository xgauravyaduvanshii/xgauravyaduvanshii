name: Continuous Profile View Booster

on:
  schedule:
    # Trigger as fast as GitHub allows (effectively every 5 minutes)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main

jobs:
  boost-views:
    runs-on: ubuntu-latest
    steps:
      - name: Boost views by hitting the counter non-stop
        run: |
          echo "Starting the Continuous View Booster..."
          
          # By looping 600 times with a 1-second sleep, this script runs for 10 minutes straight.
          # Since the cron triggers every 5 minutes, you will ALWAYS have 1 or 2 of these running 
          # at the same time, 24/7, without ever stopping. 
          # It generates a hit every single second.
          
          for i in {1..600}; do
            # Bypassing the komarev caching by spoofing a random IP address every single request
            spoof_ip="$((RANDOM % 256)).$((RANDOM % 256)).$((RANDOM % 256)).$((RANDOM % 256))"
            curl -s -o /dev/null -H "X-Forwarded-For: $spoof_ip" "https://camo.githubusercontent.com/0fc490f2810aefd7d9141709f2bb68d23469bbbd84c949d71ff9ee00c24b30a1/68747470733a2f2f6b6f6d617265762e636f6d2f67687076632f3f757365726e616d653d786761757261767961647576616e7368696926636f6c6f723d303066326665267374796c653d666f722d7468652d6261646765266c6162656c3d50524f46494c452b5649455753"
            sleep 1
          done
          
          echo "Successfully boosted views non-stop! Next runner is already handling the next batch."
