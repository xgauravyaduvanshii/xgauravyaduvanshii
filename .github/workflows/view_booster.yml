name: Continuous Profile View Booster

on:
  schedule:
    # Trigger as fast as GitHub allows (effectively every 5 minutes)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main

jobs:
  boost-views:
    runs-on: ubuntu-latest
    steps:
      - name: Boost views by hitting the counter non-stop
        run: |
          echo "Starting the Continuous View Booster..."
          
          # By looping 600 times with a 1-second sleep, this script runs for 10 minutes straight.
          # Since the cron triggers every 5 minutes, you will ALWAYS have 1 or 2 of these running 
          # at the same time, 24/7, without ever stopping. 
          # It generates a hit every single second.
          
          for i in {1..600}; do
            curl -s -o /dev/null "https://komarev.com/ghpvc/?username=xgauravyaduvanshii&color=00f2fe&style=for-the-badge&label=PROFILE+VIEWS&nocache=$RANDOM"
            sleep 1
          done
          
          echo "Successfully boosted views non-stop! Next runner is already handling the next batch."
